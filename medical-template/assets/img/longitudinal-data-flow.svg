<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <style>
    .box { fill:#ffffff; stroke:#2b6cb0; stroke-width:2; rx:6; }
    .text { font-family: Arial, sans-serif; font-size:16px; fill:#1a202c; }
    .arrow { stroke:#2b6cb0; stroke-width:3; fill:none; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b6cb0" />
    </marker>
  </defs>

  <rect x="40" y="40" width="220" height="80" class="box" />
  <text x="150" y="90" text-anchor="middle" class="text">User Input</text>

  <rect x="360" y="40" width="220" height="80" class="box" />
  <text x="470" y="90" text-anchor="middle" class="text">Structured Storage</text>

  <rect x="680" y="40" width="220" height="80" class="box" />
  <text x="790" y="90" text-anchor="middle" class="text">Longitudinal Dataset</text>

  <rect x="1000" y="40" width="160" height="80" class="box" />
  <text x="1080" y="90" text-anchor="middle" class="text">Future Research Use</text>

  <path d="M260 80 L360 80" class="arrow" />
  <path d="M580 80 L680 80" class="arrow" />
  <path d="M900 80 L1000 80" class="arrow" />
</svg>