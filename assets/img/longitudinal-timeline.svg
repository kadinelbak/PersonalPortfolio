<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <style>
    .track { fill:#e6f2ff; stroke:#cfe8ff; }
    .label { font-family: Arial, sans-serif; font-size:14px; fill:#1a202c; }
    .month { font-family: Arial, sans-serif; font-size:12px; fill:#4a5568; }
  </style>

  <!-- timeline months -->
  <text x="60" y="30" class="month">Jan</text>
  <text x="200" y="30" class="month">Feb</text>
  <text x="340" y="30" class="month">Mar</text>
  <text x="480" y="30" class="month">Apr</text>
  <text x="620" y="30" class="month">May</text>
  <text x="760" y="30" class="month">Jun</text>
  <text x="900" y="30" class="month">Jul</text>
  <text x="1040" y="30" class="month">Aug</text>

  <!-- Nutrition track -->
  <rect x="40" y="60" width="1100" height="40" class="track" rx="6"/>
  <text x="60" y="90" class="label">Nutrition</text>

  <!-- Activity track -->
  <rect x="40" y="120" width="1100" height="40" class="track" rx="6"/>
  <text x="60" y="150" class="label">Activity</text>

  <!-- Habits track -->
  <rect x="40" y="180" width="1100" height="40" class="track" rx="6"/>
  <text x="60" y="210" class="label">Habits</text>

</svg>