<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }} | Hybrid BME Portfolio</title>
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}" />
</head>
<body class="theme-portfolio">
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="{{ '/index.md' | relative_url }}">Portfolio</a>
      <nav class="nav-links">
        <a href="{{ '/index.md' | relative_url }}">About</a>
        <a href="{{ '/index.md#matrix' | relative_url }}">Projects</a>
        <a href="{{ '/index.md#contact' | relative_url }}">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="page__eyebrow">Hybrid BME Portfolio</div>
    <article class="content-card">
      {{ content }}
    </article>
  </main>
  <script>
    (function () {
      const filterGroups = document.querySelectorAll('[data-bento-filters]');
      if (!filterGroups.length) return;
      const cards = document.querySelectorAll('[data-bento-card]');
      filterGroups.forEach((group) => {
        const buttons = group.querySelectorAll('button[data-filter]');
        const applyFilter = (filter) => {
          cards.forEach((card) => {
            const categories = (card.dataset.category || '').split(/\s+/).filter(Boolean);
            const matches = filter === 'all' || categories.includes(filter);
            card.hidden = !matches;
          });
          buttons.forEach((button) => {
            const active = button.dataset.filter === filter;
            button.classList.toggle('active', active);
            button.setAttribute('aria-pressed', active ? 'true' : 'false');
          });
        };
        buttons.forEach((button) => {
          button.addEventListener('click', () => applyFilter(button.dataset.filter));
        });
        applyFilter('all');
      });
    })();
  </script>
  <script>
    (function () {
      const reveals = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
          }
        });
      }, { threshold: 0.15 });
      reveals.forEach((el) => observer.observe(el));

      const mapLinks = document.querySelectorAll('.gallery-map a');
      const sections = Array.from(mapLinks)
        .map((link) => document.querySelector(link.getAttribute('href')))
        .filter(Boolean);
      const mapObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            mapLinks.forEach((link) => link.classList.remove('active'));
            const active = document.querySelector(`.gallery-map a[href="#${entry.target.id}"]`);
            if (active) active.classList.add('active');
          }
        });
      }, { threshold: 0.35 });
      sections.forEach((section) => mapObserver.observe(section));
    })();
  </script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</body>
</html>
